openapi: 3.0.3
info:
  title: NoteApp API — AB-1003 delta (Forgot Password)
  version: 1.0.0
  description: >
    Additive delta against the eventual full API spec. Introduces
    /auth/forgot-password and /auth/reset-password. Depends on the User
    model and auth conventions introduced in AB-1002.

paths:
  /auth/forgot-password:
    post:
      summary: Request a password-reset OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: >
            Always returned, whether or not the email is registered
            (anti-enumeration). If registered, a 6-digit OTP is generated,
            bcrypt-hashed at rest, and logged server-side via console.info
            with an [OTP] prefix (no real email is sent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '400':
          description: Validation failed (malformed email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limited (3/hour, keyed by normalized email, not IP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/reset-password:
    post:
      summary: Verify OTP and set a new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: >
            Password updated. All refresh tokens for the user are revoked
            across every device/family, forcing re-login everywhere.
        '400':
          description: >
            Validation failed (malformed email/OTP shape, or newPassword
            outside 8-72 chars / missing complexity). The OTP is not
            consumed on this failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: >
            AUTH_OTP_INVALID — covers unknown email, wrong OTP, expired OTP,
            and an already-invalidated/attempts-exhausted OTP identically,
            so no branch of this endpoint leaks account existence or the
            specific failure reason.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  schemas:
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ResetPasswordRequest:
      type: object
      required: [email, otp, newPassword]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          pattern: '^[0-9]{6}$'
          description: 6-digit numeric OTP.
        newPassword:
          type: string
          minLength: 8
          maxLength: 72
          description: Must contain at least one uppercase letter, one lowercase letter, and one number.

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - AUTH_OTP_INVALID
            - RATE_LIMITED
        message:
          type: string
        fields:
          type: array
          items:
            type: string
